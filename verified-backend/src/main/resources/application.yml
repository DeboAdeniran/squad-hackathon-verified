spring:
  application:
    name: verified-backend
  profiles:
    active: dev

  security:
    filter:
      dispatcher-types: request, error, async

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/verified_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-make-it-long}
  expiration: 86400000

ml:
  service:
    url: ${ML_SERVICE_URL:http://localhost:7860}

squad:
  api:
    key: ${SQUAD_API_KEY:your-squad-sandbox-key}
    base-url: ${SQUAD_BASE_URL:https://sandbox-api-d.squadco.com}
  merchant:
    id: ${SQUAD_MERCHANT_ID:your-merchant-id}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: method

supabase:
  url: ${SUPABASE_URL}
  anon-key: ${SUPABASE_ANON_KEY}
  bucket: ${SUPABASE_BUCKET}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}