spring:
  application:
    name: verified-backend
  profiles:
    active: dev

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/verified_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-make-it-long}
  expiration: 86400000

ml:
  service:
    url: ${ML_SERVICE_URL:http://localhost:8000}

squad:
  api:
    key: ${SQUAD_API_KEY:your-squad-sandbox-key}
    base-url: https://sandbox-api-d.squadco.com

cloudinary:
  url: ${CLOUDINARY_URL:cloudinary://key:secret@cloud}